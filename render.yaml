# Render Blueprint — creates the web service + free Postgres database in one
# step. In the Render dashboard: New -> Blueprint -> select this repo.
#
# After the first deploy, set in the dashboard (Environment tab):
#   - PANCAKE_API_KEY   your real key (left blank here on purpose — never commit it)
#   - APP_URL           the *.onrender.com URL Render assigns (or your custom domain later)
# CRON_SECRET is auto-generated by Render — copy it from the dashboard to
# configure the external pinger (see /cron/run in routes/web.php).

databases:
  - name: tsd-reports-db
    plan: free
    databaseName: tsd_reports
    user: tsd_reports

services:
  - type: web
    name: tsd-reports
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /login
    envVars:
      - key: APP_NAME
        value: TSD Reports
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: tsd-reports-db
          property: connectionString
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: LOG_CHANNEL
        value: stack
      # Laravel's default 'single' channel writes to a file inside the
      # container (storage/logs/laravel.log) that Render's dashboard can
      # never show you. stderr makes every error visible in the Logs tab.
      - key: LOG_STACK
        value: stderr
      - key: PANCAKE_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
